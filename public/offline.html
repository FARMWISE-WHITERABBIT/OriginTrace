<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2E7D6B" />
  <title>Offline - OriginTrace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #F8FAF9;
      color: #1a2e28;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .logo img { height: 36px; width: auto; }
    .logo span {
      font-size: 1.25rem;
      font-weight: 700;
      color: #2E7D6B;
      letter-spacing: -0.02em;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #e8f5f1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-wrap svg { width: 36px; height: 36px; color: #2E7D6B; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #1a2e28;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #5a706a;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #2E7D6B;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.625rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .retry-btn:hover { background: #256b5b; }
    .retry-btn:active { background: #1e5a4c; }
    .retry-btn svg { width: 18px; height: 18px; }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #8a9e98;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/images/icon-green.png" alt="OriginTrace" />
      <span>OriginTrace</span>
    </div>
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like your device has lost its internet connection. Previously visited pages may still be available, but this page hasn't been cached yet.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
      </svg>
      Try again
    </button>
    <p class="hint">Your pending data is safely stored and will sync automatically when you're back online.</p>
  </div>
</body>
</html>
